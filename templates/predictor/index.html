<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Car Price Predictor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
     display:flex;align-items:center;justify-content:center;padding:30px;
     font-family:'Segoe UI',sans-serif;color:#fff}
.card{background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.15);border-radius:24px;
      padding:36px;width:100%;max-width:520px;box-shadow:0 25px 45px rgba(0,0,0,0.4)}
h1{text-align:center;font-size:1.6rem;margin-bottom:4px}
p.sub{text-align:center;opacity:.55;font-size:.82rem;margin-bottom:22px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.full{grid-column:1/-1}
label{display:block;font-size:.72rem;opacity:.65;margin-bottom:3px;margin-top:2px}
select,input{width:100%;padding:9px 12px;
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);
  border-radius:10px;color:#fff;font-size:.88rem}
select option{background:#1e1b4b}
input::placeholder{opacity:.4}
button{margin-top:18px;width:100%;padding:13px;
  background:linear-gradient(90deg,#6a11cb,#2575fc);
  border:none;border-radius:12px;color:#fff;font-size:1rem;
  font-weight:600;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.87}
.result{margin-top:16px;text-align:center;
  background:rgba(106,17,203,0.25);border:1px solid rgba(106,17,203,0.5);
  border-radius:12px;padding:14px;font-size:1.4rem;font-weight:700}
</style>
</head>
<body>
<div class="card">
  <h1>🚗 Car Price Predictor</h1>
  <p class="sub">Predict used car price in Indian Rupees (Lakhs)</p>
  <form method="POST">{% csrf_token %}
    <div class="grid">
      <div class="full">
        <label>Insurance Type</label>
        <select name="insurance_validity">
          <option>Comprehensive</option>
          <option>Third Party insurance</option>
          <option>Zero Dep</option>
          <option>Third Party</option>
          <option>Not Available</option>
        </select>
      </div>
      <div>
        <label>Fuel Type</label>
        <select name="fuel_type">
          <option>Petrol</option><option>Diesel</option><option>CNG</option>
        </select>
      </div>
      <div>
        <label>Transmission</label>
        <select name="transmission">
          <option>Manual</option><option>Automatic</option>
        </select>
      </div>
      <div>
        <label>Ownership</label>
        <select name="ownsership">
          <option>First Owner</option><option>Second Owner</option>
          <option>Third Owner</option><option>Fifth Owner</option>
        </select>
      </div>
      <div>
        <label>Seats</label>
        <select name="seats">
          <option value="2">2</option><option value="4">4</option>
          <option value="5" selected>5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option>
        </select>
      </div>
      <div>
        <label>Manufacturing Year</label>
        <input type="number" name="manufacturing_year" placeholder="e.g. 2019" min="2000" max="2024" required>
      </div>
      <div>
        <label>Kilometres Driven</label>
        <input type="number" name="kms_driven" placeholder="e.g. 45000" required>
      </div>
      <div>
        <label>Mileage (kmpl)</label>
        <input type="number" step="0.1" name="mileage" placeholder="e.g. 18.5" required>
      </div>
      <div>
        <label>Engine (cc)</label>
        <input type="number" name="engine" placeholder="e.g. 1500" required>
      </div>
      <div>
        <label>Max Power (bhp)</label>
        <input type="number" step="0.1" name="max_power" placeholder="e.g. 115" required>
      </div>
      <div class="full">
        <label>Torque (Nm)</label>
        <input type="number" step="0.1" name="torque" placeholder="e.g. 250" required>
      </div>
    </div>
    <button type="submit">Predict Price →</button>
  </form>
  {% if result %}
  <div class="result">💰 Estimated Price: ₹{{ result }} Lakhs</div>
  {% endif %}
</div>
</body>
</html>
